<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMB Bus Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <section class="control-panel">
        <h1>AMB Bus Tracker</h1>
        <p class="subtitle">
          Consulta llegadas en tiempo real por ID de parada (ej: 101552).
        </p>

        <form id="search-form" class="search-row">
          <input
            id="stop-id-input"
            type="text"
            inputmode="numeric"
            placeholder="Introduce el ID de parada"
            required
          />
          <button type="submit" id="search-button">Buscar</button>
        </form>

        <div class="action-row">
          <button id="refresh-button" class="secondary">Actualizar</button>
          <span id="refresh-info">Auto-refresh: cada 30s</span>
        </div>

        <div id="status-banner" class="status-banner">Sin consulta activa.</div>

        <section id="results-panel" class="results-panel">
          <div class="empty-state">
            Busca una parada para ver los proximos autobuses.
          </div>
        </section>
      </section>

      <section class="map-panel">
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script>
      // Si frontend y backend viven en dominios distintos, descomenta la siguiente linea:
      // window.API_BASE_URL = "https://tu-backend.onrender.com";
    </script>
    <script src="./script.js"></script>
  </body>
</html>
